---
- name: Setup and Start StudyOS Docker Containers
  hosts: local
  become: false

  vars:
    project_dir: "/home/dell/Desktop/Sem_2/SPE/END_PROJECT/student-task-pipeline"

  tasks:
    - name: Check Docker daemon is running
      command: docker info
      register: docker_info
      ignore_errors: yes

    - name: Fail if Docker is not running
      fail:
        msg: "Docker daemon is NOT running! Start it with: sudo systemctl start docker"
      when: docker_info.rc != 0

    - name: Stop any existing StudyOS containers
      shell: docker-compose down --remove-orphans
      args:
        chdir: "{{ project_dir }}"
      ignore_errors: yes

    - name: Remove conflicting named containers (clean slate)
      shell: |
        docker rm -f studyos-mongodb studyos-auth studyos-task studyos-frontend studyos-scheduler 2>/dev/null || true
      ignore_errors: yes

    - name: Build all Docker images
      shell: docker-compose build
      args:
        chdir: "{{ project_dir }}"

    - name: Start all containers in detached mode
      shell: docker-compose up -d
      args:
        chdir: "{{ project_dir }}"

    - name: Wait for containers to fully start
      pause:
        seconds: 10

    - name: Check all running containers
      command: docker ps
      register: containers

    - name: Print container status
      debug:
        msg: "{{ containers.stdout_lines }}"

    - name: Verify frontend is accessible
      uri:
        url: "http://localhost:3000"
        status_code: 200
      register: frontend_check
      ignore_errors: yes

    - name: Print access URLs
      debug:
        msg:
          - "✅ StudyOS Docker setup complete!"
          - "🌐 Frontend  → http://localhost:3000"
          - "🔐 Auth      → http://localhost:5002"
          - "📋 Tasks     → http://localhost:5001"
          - "⏰ Scheduler → http://localhost:5003"
