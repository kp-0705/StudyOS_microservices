---
- name: Configure Environment Variables for StudyOS
  hosts: local
  become: false

  vars:
    project_dir: "/home/dell/Desktop/Sem_2/SPE/END_PROJECT/student-task-pipeline"
    mongo_uri: "mongodb://mongodb:27017/studyos"
    jwt_secret: "studyos_super_secret_key"
    auth_service_url: "http://auth-service:5002"
    task_service_url: "http://task-service:5001"

  tasks:
    - name: Create .env for auth-service
      copy:
        dest: "{{ project_dir }}/services/auth-service/.env"
        content: |
          PORT=5002
          MONGO_URI={{ mongo_uri }}
          JWT_SECRET={{ jwt_secret }}

    - name: Create .env for task-service
      copy:
        dest: "{{ project_dir }}/services/task-service/.env"
        content: |
          PORT=5001
          MONGO_URI={{ mongo_uri }}
          JWT_SECRET={{ jwt_secret }}
          AUTH_SERVICE_URL={{ auth_service_url }}

    - name: Create .env for scheduler-service
      copy:
        dest: "{{ project_dir }}/services/scheduler-service/.env"
        content: |
          PORT=5003
          TASK_SERVICE_URL={{ task_service_url }}

    - name: Create .env for frontend
      copy:
        dest: "{{ project_dir }}/frontend/.env"
        content: |
          REACT_APP_AUTH_URL=http://localhost:5002
          REACT_APP_TASK_URL=http://localhost:5001

    - name: Environment variables configured successfully
      debug:
        msg: "✅ All .env files created for StudyOS services!"
