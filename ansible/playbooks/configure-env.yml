---
- name: Configure Environment Variables for StudyOS
  hosts: local
  become: false

  vars:
    mongo_uri: "mongodb://localhost:27017/studyos"
    jwt_secret: "studyos_super_secret_key"
    auth_service_url: "http://localhost:5002"
    task_service_url: "http://localhost:5001"

  tasks:
    - name: Create .env for auth-service
      copy:
        dest: "/mnt/c/Users/HP/OneDrive/Desktop/MTech/Sem2/SPE/Final Project/studyos/services/auth-service/.env"
        content: |
          PORT=5002
          MONGO_URI={{ mongo_uri }}
          JWT_SECRET={{ jwt_secret }}

    - name: Create .env for task-service
      copy:
        dest: "/mnt/c/Users/HP/OneDrive/Desktop/MTech/Sem2/SPE/Final Project/studyos/services/task-service/.env"
        content: |
          PORT=5001
          MONGO_URI={{ mongo_uri }}
          JWT_SECRET={{ jwt_secret }}
          AUTH_SERVICE_URL={{ auth_service_url }}

    - name: Create .env for scheduler-service
      copy:
        dest: "/mnt/c/Users/HP/OneDrive/Desktop/MTech/Sem2/SPE/Final Project/studyos/services/scheduler-service/.env"
        content: |
          PORT=5003
          TASK_SERVICE_URL={{ task_service_url }}

    - name: Environment variables configured successfully
      debug:
        msg: "All .env files created for StudyOS services!"
