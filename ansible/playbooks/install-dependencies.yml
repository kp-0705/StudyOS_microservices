---
- name: Install StudyOS Dependencies
  hosts: local
  become: false

  vars:
    project_dir: "/home/dell/Desktop/Sem_2/SPE/END_PROJECT/student-task-pipeline"

  tasks:
    - name: Check if Node.js is available
      command: which node
      register: node_check
      ignore_errors: yes

    - name: Check Node.js version
      shell: node --version
      register: node_version
      ignore_errors: yes

    - name: Print Node.js version
      debug:
        msg: "Node.js version: {{ node_version.stdout }}"
      when: node_version.stdout is defined

    - name: Check Docker version
      command: docker --version
      register: docker_version
      ignore_errors: yes

    - name: Print Docker version
      debug:
        msg: "Docker version: {{ docker_version.stdout }}"
      when: docker_version.rc == 0

    - name: Install auth-service dependencies
      shell: npm install
      args:
        chdir: "{{ project_dir }}/services/auth-service"
      ignore_errors: yes

    - name: Install task-service dependencies
      shell: npm install
      args:
        chdir: "{{ project_dir }}/services/task-service"
      ignore_errors: yes

    - name: Install scheduler-service dependencies
      shell: npm install
      args:
        chdir: "{{ project_dir }}/services/scheduler-service"
      ignore_errors: yes

    - name: Install frontend dependencies
      shell: npm install
      args:
        chdir: "{{ project_dir }}/frontend"
      ignore_errors: yes

    - name: Dependencies installation complete
      debug:
        msg: "✅ All dependencies installed successfully for StudyOS!"