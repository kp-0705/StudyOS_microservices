# ============================================================
# HorizontalPodAutoscaler: task-service
# Scales task-service pods 1–5 based on CPU/Memory usage
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-service-hpa
  namespace: studyos
  labels:
    app: studyos
    component: task-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-service

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
